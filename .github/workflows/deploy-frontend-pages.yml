# Deploy the React SPA to GitHub Pages on every push to main.
# Enable once: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy Frontend (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: npm ci
      - name: Build for GitHub Pages
        run: npm run build
        env:
          # Project site URL: https://<user>.github.io/<repo-name>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          # Set in GitHub: Settings → Secrets and variables → Actions → Variables
          # Example: https://your-api.onrender.com (no trailing slash)
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - id: deployment
        uses: actions/deploy-pages@v4
